<!DOCTYPE html>
<html>
  <head>
    <title>Todo App</title>
    <link
      href="https://fonts.googleapis.com/css?family=Lato:300,400,700"
      rel="stylesheet"
    >
    <link
      rel="stylesheet"
      href="style.css"
      media="screen"
      typecharset="utf-8"
    >
  </head>
  <body class="page">
    <header class="img-wrap">
      <img src="./eisenhower-matrix.jpg">
      <a class="more-info" href="https://goal-life.com/page/method/matrix-eisenhower">Want more details?</a>
    </header>
    <main class="app-container">
      <section id="new-item">
        <h2 class="label-new-task" for="new-task">Add Item</h2>
        <div class="task-row">
          <input id="new-task"class="task input-text" type="text">
          <button class="btn">Add</button>
        </div>
      </section>
      <section>
        <h2 class="list-title">Todo</h2>
        <ul class="task-list" id="incomplete-tasks">
          <li class="task-item">
            <input class="checkbox" type="checkbox">
            <label class="task">Pay Bills</label>
            <input type="text" class="task input-text">
            <button class="edit btn">Edit</button>
            <button class="delete btn">
              <img class="btn-img" src="./remove.svg">
            </button>
          </li>
          <li class="edit-mode task-item">
            <input class="checkbox" type="checkbox">
            <label class="task">Go Shopping</label>
            <input type="text" value="Go Shopping" class="task input-text">
            <button class="edit btn">Save</button>
            <button class="delete btn">
              <img class="btn-img" src="./remove.svg">
            </button>
          </li>
        </ul>
      </section>
      <section>
        <h2 class="list-title">Completed</h2>
        <ul class="task-list" id="completed-tasks">
          <li class="task-item">
            <input class="checkbox" type="checkbox" checked>
            <label class="task">See the Doctor</label>
            <input type="text" class="task input-text">
            <button class="edit btn">Edit</button>
            <button class="delete btn">
              <img class="btn-img" src="./remove.svg">
            </button>
          </li>
        </ul>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
