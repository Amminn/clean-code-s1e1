<!DOCTYPE html>
<html>
  <head>
    <title>Todo App</title>
    <link
      href="https://fonts.googleapis.com/css?family=Lato:300,400,700"
      rel="stylesheet"
    >
    <link
      rel="stylesheet"
      href="style.css"
      media="screen"
      charset="utf-8"
    >
  </head>
  <body class="page">
    <header class="header">
      <img src="./eisenhower-matrix.jpg" alt="eisenhower matrix informative image">
      <a class="header__info" href="https://goal-life.com/page/method/matrix-eisenhower">Want more details?</a>
    </header>
    <main class="app-container">
      <section class="app__new-item" id="new-item">
        <h2 class="new-item__title item--label">Add Item</h2>
        <div class="task-row">
          <input class="task-row__input task input-text" id="new-task" type="text">
          <button class="task-row__btn btn">Add</button>
        </div>
      </section>
      <section class="task-section">
        <h2 class="task-section__title">Todo</h2>
        <ul class="task-section__list" id="incomplete-tasks">
          <li class="task-section__item">
            <input class="task-section__checkbox" type="checkbox">
            <label class="task-section__task task">Pay Bills</label>
            <input type="text" class="task-section__input task input-text">
            <button class="btn btn--edit">Edit</button>
            <button class="btn btn--delete">
              <img class="btn__img" src="./remove.svg" alt="remove icon">
            </button>
          </li>
          <li class="edit-mode task-section__item">
            <input class="task-section__checkbox" type="checkbox">
            <label class="task-section__task task">Go Shopping</label>
            <input type="text" value="Go Shopping" class="task-section__input task input-text">
            <button class="btn btn--edit">Save</button>
            <button class="btn btn--delete">
              <img class="btn__img" src="./remove.svg" alt="remove icon">
            </button>
          </li>
        </ul>
      </section>
      <section class="task-section">
        <h2 class="task-section__title">Completed</h2>
        <ul class="task-section__list" id="completed-tasks">
          <li class="task-section__item">
            <input class="task-section__checkbox" type="checkbox" checked>
            <label class="task-section__element task">See the Doctor</label>
            <input type="text" class="task-section__input task input-text">
            <button class="btn btn--edit">Edit</button>
            <button class="btn btn--delete">
              <img class="btn__img" src="./remove.svg" alt="remove icon">
            </button>
          </li>
        </ul>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
